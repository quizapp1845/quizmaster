{% extends "base.html" %}
{% block content %}
<div class="max-w-md mx-auto mt-10">
    <div class="glass-card p-8 fade-in-up">
        <h2 class="text-3xl font-bold text-center mb-6">Welcome Back</h2>
        <form method="POST">
            <input type="email" name="email" placeholder="Email" class="form-control w-full mb-4" required>
            <input type="password" name="password" placeholder="Password" class="form-control w-full mb-4" required>
            <button type="submit" class="btn-primary w-full">Login</button>
        </form>
        <div class="relative my-6">
            <div class="absolute inset-0 flex items-center"><div class="w-full border-t"></div></div>
            <div class="relative flex justify-center text-sm"><span class="px-2 bg-white">Or continue with</span></div>
        </div>
        <a href="/google-login" class="btn-outline-glass w-full text-center block">Sign in with Google</a>
        <p class="text-center mt-4">Don't have an account? <a href="/register" class="text-purple-600">Register</a></p>
    </div>
</div>
{% endblock %}
