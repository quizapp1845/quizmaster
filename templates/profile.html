{% extends "base.html" %}
{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="glass-card p-8 fade-in-up">
        <h2 class="text-3xl font-bold mb-6">Your Profile</h2>
        <form method="POST">
            <div class="mb-4"><label class="block mb-2">Username</label><input type="text" name="username" value="{{ user.username }}" class="form-control w-full" required></div>
            <div class="mb-4"><label class="block mb-2">Email</label><input type="email" name="email" value="{{ user.email }}" class="form-control w-full" required></div>
            <button type="submit" class="btn-primary">Update Profile</button>
        </form>
        <div class="mt-6 p-4 bg-gray-50 rounded"><p>Member since: {{ user.created_at[:10] }}</p><p>Total Points: {{ user.total_correct }}</p></div>
    </div>
</div>
{% endblock %}
