{% extends "base.html" %} {% block content %}
<div class="max-w-2xl mx-auto">
  <div class="glass-card p-8">
    <h1 class="text-2xl font-bold mb-6">Add New Question</h1>
    <form method="POST">
      <select name="topic" class="form-control w-full mb-4" required>
        <option value="">Select Topic</option>
        <option value="Theory of Computation">Theory of Computation</option>
        <option value="Advance Java">Advance Java</option>
        <option value="Python">Python</option>
        <option value="AI">AI</option>
      </select>
      <textarea
        name="question_text"
        placeholder="Question text"
        class="form-control w-full mb-4"
        rows="3"
        required
      ></textarea>
      <input
        type="text"
        name="option1"
        placeholder="Option 1"
        class="form-control w-full mb-2"
        required
      />
      <input
        type="text"
        name="option2"
        placeholder="Option 2"
        class="form-control w-full mb-2"
        required
      />
      <input
        type="text"
        name="option3"
        placeholder="Option 3"
        class="form-control w-full mb-2"
        required
      />
      <input
        type="text"
        name="option4"
        placeholder="Option 4"
        class="form-control w-full mb-2"
        required
      />
      <select name="correct_option" class="form-control w-full mb-4" required>
        <option value="1">Option 1 is correct</option>
        <option value="2">Option 2 is correct</option>
        <option value="3">Option 3 is correct</option>
        <option value="4">Option 4 is correct</option>
      </select>
      <select name="difficulty" class="form-control w-full mb-4">
        <option value="1">Easy</option>
        <option value="2">Medium</option>
        <option value="3">Hard</option>
      </select>
      <button type="submit" class="btn-primary w-full">Save Question</button>
    </form>
  </div>
</div>
{% endblock %}
