{% extends "base.html" %} {% block content %}
<div class="max-w-6xl mx-auto">
  <h1 class="text-3xl font-bold mb-6">All Quiz Attempts</h1>
  <div class="glass-card overflow-x-auto">
    <table class="w-full">
      <thead>
        <tr>
          <th>User</th>
          <th>Topic</th>
          <th>Score</th>
          <th>Date</th>
        </tr>
      </thead>
      <tbody>
        {% for a in attempts %}
        <tr>
          <td>{{ a.username }}</td>
          <td>{{ a.topic }}</td>
          <td>{{ a.score }}/{{ a.total_questions }}</td>
          <td>{{ a.timestamp[:16] }}</td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>
{% endblock %}
